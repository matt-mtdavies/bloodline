#:schema node_modules/wrangler/config-schema.json
# Full family archive export — Workflow Worker (docs/FULL-ARCHIVE-EXPORT.md §2.4,
# §10). Deployed SEPARATELY from the main `bloodline` Pages project — Pages
# Functions cannot bind a Workflow directly, so this Worker owns the Workflow
# and exposes a narrow RPC surface (see src/entrypoint.js) that Pages reaches
# through a service binding (`EXPORT_WORKFLOW_SERVICE` in the main project).
#
# This file is a template: the real deploy target (account, D1/R2 ids) is
# filled in by a human operator per docs/FULL-ARCHIVE-EXPORT.md §11/§14 — no
# production credentials are committed here. See ../../docs/FULL-ARCHIVE-EXPORT-PHASE-A-RUNBOOK.md
# for exactly what that operator needs to do that this sandbox could not.
name = "bloodline-export-workflow"
main = "src/entrypoint.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

# Paid-plan CPU ceiling for the packaging stage (docs/FULL-ARCHIVE-EXPORT.md
# §2.6) — a safety ceiling, not a target: individual steps are budgeted to
# stay under 20s so retries stay cheap, this just bounds the worst case.
[limits]
cpu_ms = 300000

[[workflows]]
name = "bloodline-family-archive-export"
binding = "EXPORT_WORKFLOW"
class_name = "FamilyArchiveExportWorkflow"

# sendCompletionEmailStep (src/workflowSteps.js) reuses the SAME
# functions/_lib/util.js#sendEmail helper the main Pages project uses, but
# this is a completely separately-deployed Worker — env vars and secrets are
# never shared across Workers just because they're in the same account, so
# both must be configured here too, independently of the root wrangler.toml.
# Without them, sendCompletionEmailStep silently no-ops (best-effort by
# design — a missing/misconfigured email must never fail an otherwise-ready
# export; see the step's own comment) and no completion email is ever sent,
# which was a real gap a PR #9 review caught: this file had no [vars] block
# and no documented secret step at all before this fix.
[vars]
# Must match the root wrangler.toml's APP_URL exactly — it's what the
# completion email links back to (a family's export history or the admin
# exports page). workflow.js already falls back to the production URL if
# this is ever unset, so a missed override here degrades gracefully rather
# than linking somewhere wrong.
APP_URL = "https://myfamilybloodline.com"
# Must match the root wrangler.toml's FROM_EMAIL exactly (see util.js#sendEmail
# — required, not optional: sendEmail throws without it, which
# sendCompletionEmailStep only catches and reports as `sent: false`, so a
# forgotten override here means completion emails silently never send).
FROM_EMAIL = "hello@myfamilybloodline.com"
# BREVO_API_KEY is a SECRET, not a var — set it on THIS Worker specifically
# (secrets do not carry over from the root Pages project):
#   cd workers/export-workflow && npx wrangler secret put BREVO_API_KEY
# Left unset, sendEmail logs "[dev] email suppressed" and returns without
# sending (util.js's own dev-mode fallback) — safe, but silent; see the
# rollout runbook (docs/FULL-ARCHIVE-EXPORT-COMPLETION-RUNBOOK.md) for when
# a human operator should actually provision this.

# Same D1 database and EU-jurisdiction R2 bucket as the main Pages project
# (wrangler.toml at the repo root) — this Worker must not create a second
# source of truth. Fill in the real database_id once deployed; it must match
# the root wrangler.toml's [[d1_databases]] entry exactly.
[[d1_databases]]
binding = "DB"
database_name = "bloodline"
database_id = "96e94723-103f-4c4f-a1b0-797810e7dfc9"

[[r2_buckets]]
binding = "DOCS"
bucket_name = "bloodline-docs"
jurisdiction = "eu"

# Private staging + final archive storage — same bucket, a dedicated prefix
# (docs/FULL-ARCHIVE-EXPORT.md §4.2/§4.3). No separate bucket: one R2 bucket,
# one jurisdiction, one place documents/photos/exports all actually live.

# §8 cleanup/reconciliation — invokes entrypoint.js's `scheduled()` handler
# (runCleanupSweep). Runs hourly: frequent enough that a 30-minute-stale
# job or a just-expired archive doesn't sit around for long, cheap enough
# that an hourly bounded sweep is a non-issue.
[triggers]
crons = ["0 * * * *"]
