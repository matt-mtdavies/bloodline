<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS ignores the manifest/SVG for the home-screen icon and, without
         this, silently falls back to an auto-generated (blurry) screenshot
         icon instead — this is what was actually making it look low-res. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <!-- iOS Safari inverts colours in dark mode and wrecks the palette.
         Force light colour-scheme globally. (See §8 of the brief.) -->
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <meta name="theme-color" content="#f7f3ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bloodline" />
    <title>Bloodline — a living portrait of your family</title>
    <!-- Pre-boot splash: visible immediately, replaced when React mounts.
         Hardcoded colours so it works before any CSS bundle loads. -->
    <style>
      #pre-boot {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #faf7f4;
      }
      #pre-boot > svg { animation: pb-pulse 1.8s ease-in-out infinite; }
      @keyframes pb-pulse { 0%,100%{opacity:.9} 50%{opacity:.55} }
    </style>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"><div id="pre-boot"><svg width="42" height="40" viewBox="0 0 42 40" fill="none" aria-hidden="true"><circle cx="15" cy="17" r="10" fill="#c2603a"/><circle cx="27" cy="17" r="10" fill="#3f5e4e"/><circle cx="21" cy="29" r="6.6" fill="#b08642"/></svg></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
