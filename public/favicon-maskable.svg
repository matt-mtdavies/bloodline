<!-- Maskable variant for Android adaptive icons: OS applies its own crop
     shape (circle, squircle, rounded-square…), so this is full-bleed with
     no corner radius of its own, and the artwork is padded in to sit
     within the ~66% "safe zone" the maskable spec requires so nothing
     gets clipped regardless of which shape the launcher picks. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect width="96" height="96" fill="#1c1108"/>
  <g transform="translate(16,16)">
    <circle cx="23.7" cy="24.9" r="14.2" fill="#c2603a" stroke="#1c1108" stroke-width="3.3"/>
    <circle cx="42.6" cy="24.9" r="14.2" fill="#3f5e4e" stroke="#1c1108" stroke-width="3.3"/>
    <circle cx="33.2" cy="42.6" r="9.4"  fill="#c4913f" stroke="#1c1108" stroke-width="3.3"/>
  </g>
</svg>
