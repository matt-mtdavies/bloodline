#:schema node_modules/wrangler/config-schema.json
name = "bloodline"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

# Non-secret vars. Secrets (BREVO_API_KEY, ANTHROPIC_API_KEY, SESSION_SECRET,
# FAMILYSEARCH_CLIENT_ID) go in .dev.vars locally and
# `wrangler pages secret put` (or Pages dashboard → Settings → Variables) in prod.
[vars]
APP_URL = "https://myfamilybloodline.com"  # override locally in .dev.vars
FROM_EMAIL = "hello@myfamilybloodline.com"
# FAMILYSEARCH_CLIENT_ID is a secret — set via wrangler pages secret put FAMILYSEARCH_CLIENT_ID
# Register your app at https://developer.familysearch.org and add this redirect URI:
#   https://myfamilybloodline.com/fs-callback.html
# Also set VITE_FAMILYSEARCH_CLIENT_ID in Pages → Settings → Environment variables (build-time).
#
# ADMIN_EMAILS — comma-separated allowlist for /admin.html (Pages → Settings →
# Environment variables, not committed here since these are personal emails).
# The old singular ADMIN_EMAIL still works as a one-address fallback.
#
# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ZONE_ID — optional, enable the Cloudflare
# traffic section of the admin dashboard (requests/bandwidth/threats). Create
# a token at dash.cloudflare.com/profile/api-tokens with the "Zone Analytics"
# → Read permission scoped to this zone; the Zone ID is on the zone's
# Overview page. Both secrets — set via wrangler pages secret put.

# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare D1 — already created and migrated (Western Europe).
# Run `wrangler d1 migrations apply bloodline --remote` after any new migration.
[[d1_databases]]
binding = "DB"
database_name = "bloodline"
database_id = "96e94723-103f-4c4f-a1b0-797810e7dfc9"

# R2 bucket — created with EU jurisdiction (must match here).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "bloodline-docs"
jurisdiction = "eu"
