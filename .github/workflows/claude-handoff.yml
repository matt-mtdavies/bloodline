name: Claude handoff

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-handoff-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review-brief:
    name: Review implementation brief
    if: github.event.label.name == 'ready-for-claude-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
      actions: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Ask Claude to review the brief
        uses: anthropics/claude-code-action@48698f76cceef03bcc3a54a17497fbfdd60d95fb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the implementation brief referenced by GitHub issue
            #${{ github.event.issue.number }} in ${{ github.repository }}.

            Read AGENTS.md, docs/OPERATING-SYSTEM.md, the issue title and body, the
            published brief, and the current source, tests, migrations, and deployment
            configuration relevant to it.

            This is a review-only handoff. Do not edit files, create a branch, implement
            the feature, deploy, migrate data, or perform production operations.

            Post one concise issue comment containing:
            1. blocking corrections required before implementation;
            2. non-blocking recommendations;
            3. confirmed decisions and assumptions;
            4. an explicit "ready for implementation" or "not ready" conclusion.

            Use exact file and line references where useful. Treat privacy,
            authorization, persistence, compatibility, failure behavior, scale,
            verification, deployment, and recovery as first-class review concerns.
          claude_args: |
            --max-turns 12

  implement-brief:
    name: Implement approved brief
    if: github.event.label.name == 'ready-for-claude-build'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Ask Claude to implement the approved brief
        uses: anthropics/claude-code-action@48698f76cceef03bcc3a54a17497fbfdd60d95fb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Implement the approved brief referenced by GitHub issue
            #${{ github.event.issue.number }} in ${{ github.repository }}.

            Read AGENTS.md, docs/OPERATING-SYSTEM.md, the issue title and body, the
            published brief, and all review discussion before changing code. The
            ready-for-claude-build label means Codex has resolved the design review
            within the repository owner's original scope.

            Work on a short-lived claude/ branch from current main. Keep the change
            within the approved brief, add or update tests, and run the relevant
            verification. Never deploy, run a remote migration, mutate production
            data, expose secrets, or perform an R3 operation.

            Commit and push the completed implementation. Open a pull request against
            main if repository permissions allow it. Otherwise comment with the exact
            pushed branch and GitHub compare URL so Codex can open the PR.

            The pull request or issue comment must report:
            - implemented scope and deliberate exclusions;
            - risk level and data/auth/external-service impact;
            - exact checks and results;
            - preview or visual evidence when applicable;
            - recovery notes and remaining limitations;
            - that final Codex review is required before human merge.
          claude_args: |
            --max-turns 40
            --allowedTools "Bash(npm ci),Bash(npm run build),Bash(npm run verify:env),Bash(npm run test:*),Bash(npm run browser:install)"
